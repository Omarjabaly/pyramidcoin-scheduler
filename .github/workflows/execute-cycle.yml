name: Execute PyramidCoin Cycle

on:
  workflow_dispatch:

  schedule:
    # Every five minutes, offset by two minutes.
    - cron: "2-59/5 * * * *"

permissions:
  contents: read

concurrency:
  group: pyramidcoin-scheduled-cycle
  cancel-in-progress: false

jobs:
  execute-cycle:
    name: Call executeScheduledCycle
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Execute scheduled cycle
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          PYRAMIDCOIN_ADDRESS: ${{ secrets.PYRAMIDCOIN_ADDRESS }}
        run: npm run execute-cycle